<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ご予約フォーム | ヘアーサロン フレン</title>
<style>
  body { font-family: 'Helvetica Neue', Arial, sans-serif; padding: 20px; background-color: #f4f6f9; color: #333; }
  .container { max-width: 500px; margin: 0 auto; background: #fff; padding: 30px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
  h2 { text-align: center; color: #4a4a4a; margin-bottom: 24px; }
  label { display: block; margin-bottom: 8px; font-weight: bold; font-size: 14px; }
  input, select { width: 100%; padding: 12px; margin-bottom: 24px; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; font-size: 16px; }
  button { width: 100%; padding: 15px; background-color: #5b8a72; color: white; border: none; border-radius: 6px; font-size: 16px; font-weight: bold; cursor: pointer; transition: background-color 0.3s; }
  button:hover { background-color: #4a755f; }
  button:disabled { background-color: #ccc; cursor: not-allowed; }
  #message { margin-top: 20px; text-align: center; font-weight: bold; color: #5b8a72; }
  .error { color: #d9534f !important; }
</style>
</head>
<body>

<div class="container">
  <h2>フレン 予約フォーム</h2>
  <form id="reservationForm">
    <label for="name">お名前</label>
    <input type="text" id="name" name="name" required placeholder="例：山田 花子">

    <label for="datetime">ご希望の日時</label>
    <input type="datetime-local" id="datetime" name="datetime" required>

    <label for="menu">ご希望のメニュー</label>
    <select id="menu" name="menu" required>
      <option value="">選択してください</option>
      <option value="カット">カット</option>
      <option value="カラー">カラー</option>
      <option value="カット＋カラー">カット＋カラー</option>
      <option value="パーマ">パーマ</option>
      <option value="トリートメント">トリートメント</option>
    </select>

    <button type="submit">予約を送信する</button>
  </form>
  <div id="message"></div>
</div>

<script>
  // ★ここにGASの「ウェブアプリのURL」を貼り付けます★
  const endpoint = "https://script.google.com/macros/s/AKfycbzejEeCbhMKFZMTOOQwThfx1xFyni0QVpO4EQkOu9LB07vr5mrUlg-2Ps34ETwPgzNO/exec";

  document.getElementById('reservationForm').addEventListener('submit', function(e) {
    e.preventDefault(); // 画面のチラつきを防ぐ
    
    const submitButton = e.target.querySelector('button');
    submitButton.disabled = true;
    submitButton.textContent = "送信中...";

    const data = {
      name: document.getElementById('name').value,
      datetime: document.getElementById('datetime').value,
      menu: document.getElementById('menu').value
    };

    fetch(endpoint, {
      method: 'POST',
      headers: {
        'Content-Type': 'text/plain', // GASエラー回避の魔法のおまじない
      },
      body: JSON.stringify(data)
    })
    .then(response => {
      document.getElementById('message').innerText = "予約リクエストを送信しました！";
      document.getElementById('message').classList.remove('error');
      document.getElementById('reservationForm').reset();
    })
    .catch(error => {
      document.getElementById('message').innerText = "通信エラーが発生しました。もう一度お試しください。";
      document.getElementById('message').classList.add('error');
    })
    .finally(() => {
      submitButton.disabled = false;
      submitButton.textContent = "予約を送信する";
    });
  });
</script>
</body>
</html>
